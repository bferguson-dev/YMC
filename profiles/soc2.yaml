  - {check_id: "IA-002", control_id: "CC6.1", control_name: "Logical Access Security",   requirement: "Enforce password complexity."}
  - {check_id: "IA-003", control_id: "CC6.1", control_name: "Logical Access Security",   requirement: "Enforce password expiration."}
  - {check_id: "IA-004", control_id: "CC6.1", control_name: "Logical Access Security",   requirement: "Require NLA for RDP."}

