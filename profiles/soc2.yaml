# SOC 2 Trust Services Criteria Compliance Profile
# ---------------------------------------------------
profile_name: "SOC 2 Trust Services Criteria"
profile_id: "SOC2"
version: "2017 (updated 2022)"
description: >
  AICPA Trust Services Criteria for Security, Availability, Processing Integrity,
  Confidentiality, and Privacy. Required for service organizations demonstrating
  controls to customers and auditors.

