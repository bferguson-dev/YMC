  - {check_id: "AC-006", control_id: "CC6.1", control_name: "Logical Access Security",   requirement: "Configure account lockout policy."}
  - {check_id: "AC-007", control_id: "CC6.1", control_name: "Logical Access Security",   requirement: "Configure lockout duration."}
