  - {check_id: "AC-015", control_id: "CC6.1", control_name: "Logical Access Security",   requirement: "Block blank password network auth."}
  - {check_id: "AC-016", control_id: "CC6.1", control_name: "Logical Access Security",   requirement: "Configure logon banner."}
