# NIST SP 800-171 Rev 2 Compliance Profile
# ------------------------------------------
profile_name: "NIST SP 800-171 Rev 2"
profile_id: "NIST_800_171"
version: "Rev 2"
description: >
  Protecting Controlled Unclassified Information in Nonfederal Systems
  and Organizations. Required for any non-federal organization that
  processes, stores, or transmits CUI on behalf of the U.S. government.
  CMMC 2.0 Level 2 is built directly on these 110 requirements.

checks:

  # === 3.1: ACCESS CONTROL ===
  - {check_id: "AC-001", control_id: "3.1.1",  control_name: "Authorized Access Control",    requirement: "Limit system access to authorized users — identify inactive accounts."}
  - {check_id: "AC-002", control_id: "3.1.1",  control_name: "Authorized Access Control",    requirement: "Disable accounts inactive beyond the organization-defined period."}
  - {check_id: "AC-003", control_id: "3.1.1",  control_name: "Authorized Access Control",    requirement: "Disable the built-in Guest account."}
  - {check_id: "AC-004", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "Rename the default Administrator account to reduce attack surface."}
  - {check_id: "AC-005", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "Review local Administrators group for unauthorized members."}
  - {check_id: "AC-006", control_id: "3.1.8",  control_name: "Unsuccessful Logon Attempts",  requirement: "Configure account lockout threshold (max 5 invalid attempts)."}
  - {check_id: "AC-007", control_id: "3.1.8",  control_name: "Unsuccessful Logon Attempts",  requirement: "Configure account lockout duration (minimum 15 minutes)."}
  - {check_id: "AC-008", control_id: "3.1.10", control_name: "Session Lock",                 requirement: "Enforce session lock with pattern-hiding display after inactivity."}
  - {check_id: "AC-009", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "Review privileged group membership (Backup Operators, etc.)."}
  - {check_id: "AC-010", control_id: "3.1.3",  control_name: "Control CUI Flow",             requirement: "Restrict RDP access — limit exposure to authorized management hosts."}
  - {check_id: "AC-011", control_id: "3.1.1",  control_name: "Authorized Access Control",    requirement: "Enable LSA Protection (RunAsPPL) to prevent credential dumping."}
  - {check_id: "AC-012", control_id: "3.1.1",  control_name: "Authorized Access Control",    requirement: "Enable Credential Guard to isolate credentials in VBS container."}
  - {check_id: "AC-014", control_id: "3.5.3",  control_name: "Authenticator Management",     requirement: "Ensure all enabled accounts require a password."}
  - {check_id: "AC-015", control_id: "3.5.3",  control_name: "Authenticator Management",     requirement: "Block network authentication with blank passwords."}
  - {check_id: "AC-016", control_id: "3.1.9",  control_name: "Privacy and Security Notices", requirement: "Configure CUI system use notification logon banner."}
  - {check_id: "AC-017", control_id: "3.5.3",  control_name: "Authenticator Management",     requirement: "Limit cached domain credentials to 0–2."}
  - {check_id: "AC-018", control_id: "3.5.3",  control_name: "Authenticator Management",     requirement: "Disable WDigest to prevent plaintext credential exposure."}
  - {check_id: "AC-019", control_id: "3.1.1",  control_name: "Authorized Access Control",    requirement: "Restrict anonymous access to the SAM database."}
  - {check_id: "AC-020", control_id: "3.1.9",  control_name: "Privacy and Security Notices", requirement: "Display last interactive logon information at login."}
  - {check_id: "AC-022", control_id: "3.1.9",  control_name: "Privacy and Security Notices", requirement: "Do not display the last signed-in username at logon."}

  # === 3.3: AUDIT AND ACCOUNTABILITY ===
  - {check_id: "AU-001", control_id: "3.3.1",  control_name: "Create and Retain Audit Logs", requirement: "Audit logon and logoff events (success and failure)."}
  - {check_id: "AU-002", control_id: "3.3.1",  control_name: "Create and Retain Audit Logs", requirement: "Audit privilege use events."}
  - {check_id: "AU-003", control_id: "3.3.1",  control_name: "Create and Retain Audit Logs", requirement: "Audit account management events."}
  - {check_id: "AU-004", control_id: "3.3.2",  control_name: "Ensure Audit Traceability",    requirement: "Configure Security log to minimum 192MB to support retention."}
  - {check_id: "AU-005", control_id: "3.3.2",  control_name: "Ensure Audit Traceability",    requirement: "Verify log retention period is defined and enforced."}
  - {check_id: "AU-006", control_id: "3.3.2",  control_name: "Ensure Audit Traceability",    requirement: "Forward logs to a central collector for centralized retention."}
  - {check_id: "AU-007", control_id: "3.3.1",  control_name: "Create and Retain Audit Logs", requirement: "Enable advanced audit policy and process creation logging."}
  - {check_id: "AU-008", control_id: "3.3.1",  control_name: "Create and Retain Audit Logs", requirement: "Deploy Sysmon for enhanced system event logging."}
  - {check_id: "AU-011", control_id: "3.3.7",  control_name: "Authoritative Time Source",    requirement: "Configure NTP synchronization to an authoritative time source."}
  - {check_id: "AU-013", control_id: "3.3.1",  control_name: "Create and Retain Audit Logs", requirement: "Enable process command-line argument capture in audit log."}
  - {check_id: "AU-014", control_id: "3.3.2",  control_name: "Ensure Audit Traceability",    requirement: "Configure Windows Event Forwarding to a central collector."}
  - {check_id: "AU-015", control_id: "3.3.1",  control_name: "Create and Retain Audit Logs", requirement: "Audit removable storage device access events."}
  - {check_id: "PS-002", control_id: "3.3.1",  control_name: "Create and Retain Audit Logs", requirement: "Enable PowerShell Script Block Logging."}
  - {check_id: "PS-003", control_id: "3.3.1",  control_name: "Create and Retain Audit Logs", requirement: "Enable PowerShell Module Logging."}
  - {check_id: "PS-004", control_id: "3.3.1",  control_name: "Create and Retain Audit Logs", requirement: "Enable PowerShell Transcription Logging."}

  # === 3.4: CONFIGURATION MANAGEMENT ===
  - {check_id: "CM-001", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "Disable SMBv1 protocol — no valid use case remains."}
  - {check_id: "CM-002", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "Disable unnecessary and risky Windows services."}
  - {check_id: "CM-004", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "Disable AutoRun to prevent automatic malware execution."}
  - {check_id: "CM-005", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "Enable Windows Firewall on all profiles."}
  - {check_id: "CM-006", control_id: "3.14.1", control_name: "Flaw Remediation",               requirement: "Configure automatic updates to ensure timely patching."}
  - {check_id: "CM-007", control_id: "3.13.16",control_name: "CUI at Rest",                    requirement: "Enable BitLocker on OS volume to protect CUI at rest."}
  - {check_id: "CM-008", control_id: "3.13.8", control_name: "Cryptographic Protection",       requirement: "Disable weak TLS protocols and cipher suites."}
  - {check_id: "CM-009", control_id: "3.4.2",  control_name: "Security Configuration",         requirement: "Deploy LAPS to manage unique local administrator passwords."}
  - {check_id: "CM-010", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "Disable Windows Script Host."}
  - {check_id: "CM-011", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "Implement AppLocker or WDAC application control policy."}
  - {check_id: "CM-016", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "Disable AutoPlay for all drive types."}
  - {check_id: "PS-001", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "Set PowerShell execution policy to RemoteSigned or AllSigned."}
  - {check_id: "PS-005", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "Disable PowerShell v2 to prevent logging bypass."}
  - {check_id: "SV-001", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "Disable Print Spooler on non-print servers."}
  - {check_id: "SV-002", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "Disable Remote Registry service."}
  - {check_id: "SV-003", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "Ensure Telnet is not installed."}
  - {check_id: "SV-004", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "Disable SNMP service."}
  - {check_id: "CIS-001", control_id: "3.4.2", control_name: "Security Configuration",         requirement: "Verify CIS Level 1 baseline registry configuration."}

  # === 3.5: IDENTIFICATION AND AUTHENTICATION ===
  - {check_id: "AC-013", control_id: "3.5.3",  control_name: "Authenticator Management",     requirement: "Ensure no enabled accounts have passwords set to never expire."}
  - {check_id: "IA-001", control_id: "3.5.7",  control_name: "Password Complexity",           requirement: "Enforce minimum password length of 14 characters."}
  - {check_id: "IA-002", control_id: "3.5.7",  control_name: "Password Complexity",           requirement: "Enforce password complexity requirements."}
  - {check_id: "IA-003", control_id: "3.5.7",  control_name: "Password Complexity",           requirement: "Enforce maximum password age of 90 days."}
  - {check_id: "IA-004", control_id: "3.5.3",  control_name: "Authenticator Management",     requirement: "Require Network Level Authentication (NLA) for RDP connections."}

  # === 3.11: RISK ASSESSMENT ===
  - {check_id: "SR-001", control_id: "3.11.1", control_name: "Risk Assessment",               requirement: "Verify Volume Shadow Copy / restore points are enabled."}
  - {check_id: "SR-005", control_id: "3.11.1", control_name: "Risk Assessment",               requirement: "Verify BitLocker recovery key is backed up to a safe location."}

  # === USER RIGHTS ASSIGNMENTS ===
  - {check_id: "UR-001", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeTcbPrivilege must be empty — no account holds Act as OS right."}
  - {check_id: "UR-002", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeDebugPrivilege restricted to Administrators only."}
  - {check_id: "UR-003", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeLockMemoryPrivilege must be empty."}
  - {check_id: "UR-004", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeCreateTokenPrivilege must be empty."}
  - {check_id: "UR-005", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeEnableDelegationPrivilege must be empty."}
  - {check_id: "UR-006", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeCreatePermanentPrivilege must be empty."}
  - {check_id: "UR-007", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "Guests denied network logon (SeDenyNetworkLogonRight)."}
  - {check_id: "UR-008", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "Guests denied remote interactive logon."}
  - {check_id: "UR-009", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "Everyone not in SeNetworkLogonRight."}
  - {check_id: "UR-010", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeRemoteInteractiveLogonRight restricted to Admins and RDP Users."}
  - {check_id: "UR-011", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeBackupPrivilege restricted to Administrators and Backup Operators."}
  - {check_id: "UR-012", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeRestorePrivilege restricted to Administrators and Backup Operators."}
  - {check_id: "UR-013", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeLoadDriverPrivilege restricted to Administrators only."}
  - {check_id: "UR-014", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeTakeOwnershipPrivilege restricted to Administrators only."}
  - {check_id: "UR-015", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeManageVolumePrivilege restricted to Administrators only."}
  - {check_id: "UR-016", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeSystemEnvironmentPrivilege restricted to Administrators only."}
  - {check_id: "UR-017", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeAssignPrimaryTokenPrivilege restricted to Local/Network Service."}
  - {check_id: "UR-018", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeImpersonatePrivilege restricted to Admins and service accounts."}
  - {check_id: "UR-019", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "SeSecurityPrivilege restricted to Administrators only."}
  - {check_id: "UR-020", control_id: "3.1.5",  control_name: "Least Privilege",              requirement: "Guests not permitted local interactive logon."}
  - {check_id: "AC-023", control_id: "3.5.3",  control_name: "Authenticator Management",     requirement: "Set LmCompatibilityLevel=5 to enforce NTLMv2 only."}
  - {check_id: "IA-005", control_id: "3.5.3",  control_name: "Authenticator Management",     requirement: "Kerberos maximum ticket lifetime <= 10 hours."}
  - {check_id: "IA-006", control_id: "3.5.3",  control_name: "Authenticator Management",     requirement: "Kerberos maximum service ticket lifetime <= 600 minutes."}
  - {check_id: "IA-007", control_id: "3.5.3",  control_name: "Authenticator Management",     requirement: "Kerberos maximum clock skew tolerance <= 5 minutes."}
  - {check_id: "AU-017", control_id: "3.3.1",  control_name: "Create and Retain Audit Logs", requirement: "Verify key audit subcategories are configured at required levels."}
  - {check_id: "EM-012", control_id: "3.14.2", control_name: "Malicious Code Protection",    requirement: "TPM must be present, enabled, and activated."}
  - {check_id: "EM-013", control_id: "3.14.2", control_name: "Malicious Code Protection",    requirement: "HVCI (Memory Integrity) must be enabled."}
  - {check_id: "CM-017", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "WSL must not be installed."}
  - {check_id: "CM-018", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "TFTP client must not be installed."}
  - {check_id: "CM-019", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "Simple TCP/IP Services must not be installed."}
  - {check_id: "CM-020", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "File extensions must be visible (HideFileExt=0)."}
  - {check_id: "SV-008", control_id: "3.4.7",  control_name: "Restrict Nonessential Functions", requirement: "Remote Assistance must be disabled."}
  - {check_id: "NH-014", control_id: "3.13.1", control_name: "Boundary Protection",           requirement: "Prevent NetBIOS name release on demand."}
  - {check_id: "NH-015", control_id: "3.13.1", control_name: "Boundary Protection",           requirement: "Disable router discovery (IRDP)."}

  # === 3.13: SYSTEM AND COMMUNICATIONS PROTECTION ===
  - {check_id: "NH-001", control_id: "3.13.1", control_name: "Boundary Protection",           requirement: "Disable LLMNR to prevent credential theft via name poisoning."}
  - {check_id: "NH-002", control_id: "3.13.1", control_name: "Boundary Protection",           requirement: "Disable NetBIOS over TCP/IP on all adapters."}
  - {check_id: "NH-006", control_id: "3.13.1", control_name: "Boundary Protection",           requirement: "Restrict anonymous null session access."}
  - {check_id: "NH-012", control_id: "3.13.8", control_name: "Cryptographic Protection",      requirement: "Require SMB packet signing on client and server."}
  - {check_id: "NH-013", control_id: "3.13.8", control_name: "Cryptographic Protection",      requirement: "Require High or FIPS-compliant RDP encryption."}

  # === 3.14: SYSTEM AND INFORMATION INTEGRITY ===
  - {check_id: "SI-001", control_id: "3.14.2", control_name: "Malicious Code Protection",     requirement: "Verify antivirus/EDR is present and running."}
  - {check_id: "SI-002", control_id: "3.14.2", control_name: "Malicious Code Protection",     requirement: "Verify antivirus signatures are current."}
  - {check_id: "SI-003", control_id: "3.14.1", control_name: "Flaw Remediation",              requirement: "Verify OS patch level and last update date."}
  - {check_id: "SI-004", control_id: "3.14.1", control_name: "Flaw Remediation",              requirement: "Identify missing security updates."}
  - {check_id: "SI-005", control_id: "3.14.1", control_name: "Flaw Remediation",              requirement: "Verify OS version is within Microsoft support lifecycle."}
  - {check_id: "EM-001", control_id: "3.14.2", control_name: "Malicious Code Protection",     requirement: "Enable Data Execution Prevention for all programs."}
  - {check_id: "EM-002", control_id: "3.14.2", control_name: "Malicious Code Protection",     requirement: "Enable ASLR system-wide."}
  - {check_id: "EM-005", control_id: "3.14.1", control_name: "Flaw Remediation",              requirement: "Verify PrintNightmare (CVE-2021-34527) mitigations are applied."}
  - {check_id: "EM-008", control_id: "3.14.6", control_name: "Security Alerts and Advisories",requirement: "Enable Secure Boot to detect firmware tampering."}
  - {check_id: "EM-009", control_id: "3.1.5",  control_name: "Least Privilege",               requirement: "Verify UAC is enabled and prompts on the secure desktop."}
  - {check_id: "EM-011", control_id: "3.14.2", control_name: "Malicious Code Protection",     requirement: "Configure Windows Defender Attack Surface Reduction rules."}
